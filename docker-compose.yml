services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tele
      POSTGRES_USER: tele_admin
      POSTGRES_PASSWORD: tele_password
    ports:
      - "5432:5432"
    volumes:
      - tele-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tele_admin -d tele"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
        NEXT_PUBLIC_COGNITO_DOMAIN: ${NEXT_PUBLIC_COGNITO_DOMAIN:-}
        NEXT_PUBLIC_COGNITO_CLIENT_ID: ${NEXT_PUBLIC_COGNITO_CLIENT_ID:-}
        NEXT_PUBLIC_COGNITO_REGION: ${NEXT_PUBLIC_COGNITO_REGION:-us-east-2}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "3001:3001"

volumes:
  tele-postgres-data:
