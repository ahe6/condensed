services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tele
      POSTGRES_USER: tele_admin
      POSTGRES_PASSWORD: tele_password
    ports:
      - "5432:5432"
    volumes:
      - tele-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tele_admin -d tele"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tele-postgres-data:

